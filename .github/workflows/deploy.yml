name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ cfk_P0a5cKrIeLvBZa0sltDlbYzdifcfEKBfWRqerYR5696724e4 }}
          accountId: ${{ ed4f2b8b1ba474210d2f174b2f5c379c }}
          command: pages deploy dist --project-name=cp-wp-hosting-service
